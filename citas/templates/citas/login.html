{% extends 'base.html' %}

{% block nav_actions %}{% endblock %}

{% block content %}
<div style="min-height:100vh;background:var(--smoke);padding:6rem 0 4rem;margin-top:72px;display:flex;align-items:center;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-4">
        <div class="cita-card">
          <div class="text-center mb-4">
            <span class="sec-eye">★ Acceso</span>
            <h2 class="sec-title">Panel Amaly</h2>
          </div>
          <form method="POST">
            {% csrf_token %}
            <div class="campo-grupo">
              <label class="campo-label">Usuario</label>
              <input type="text" name="username" class="campo-input" autofocus required>
            </div>
            <div class="campo-grupo">
              <label class="campo-label">Contraseña</label>
              <input type="password" name="password" class="campo-input" required>
            </div>
            {% if form.errors %}
              <div class="warn-bar mb-3">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="flex-shrink:0;"></i>
                <p>Usuario o contraseña incorrectos.</p>
              </div>
            {% endif %}
            <button type="submit" class="btn-hero-solid w-100 justify-content-center">
              <i class="bi bi-lock"></i> Ingresar
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .campo-grupo { margin-bottom: 1.5rem; }
</style>
{% endblock %}
